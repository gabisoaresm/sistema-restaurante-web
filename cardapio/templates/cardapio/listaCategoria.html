{% extends 'cardapio/base.html' %}

{% block titulo %}Categorias{% endblock %}

{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Categorias</h2>
    <a href="{% url 'cardapio:cria-categoria' %}" class="btn btn-success">+ Nova Categoria</a>
</div>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th style="width: 180px;">Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for categoria in categorias %}
        <tr>
            <td>{{ categoria.nome }}</td>
            <td>
                <a href="{% url 'cardapio:atualiza-categoria' categoria.pk %}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{% url 'cardapio:apaga-categoria' categoria.pk %}" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" class="text-center text-muted">Nenhuma categoria cadastrada.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
