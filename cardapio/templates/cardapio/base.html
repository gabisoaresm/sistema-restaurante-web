{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Restaurante{% endblock %}</title>

    <!-- Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado do app -->
    <link rel="stylesheet" href="{% static 'cardapio/css/estilo.css' %}">
</head>
<body>

    <!-- Barra de navegação -->
    {% include 'cardapio/links.html' %}

    <!-- Conteúdo principal -->
    <div class="container mt-4">
        {% block conteudo %}{% endblock %}
    </div>

    <!-- Bootstrap JS (necessário para o toggler mobile da navbar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
