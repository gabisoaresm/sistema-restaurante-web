{% extends 'cardapio/base.html' %}

{% block titulo %}Alterar Senha{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Alterar Senha</h2>

        <form method="post">
            {% csrf_token %}
            {# form é passado automaticamente pelo PasswordChangeView do Django #}
            <table class="formulario">
                {{ form.as_table }}
            </table>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Alterar Senha</button>
                <a href="{% url 'cardapio:perfil' %}" class="btn btn-outline-secondary ms-2">Voltar ao Perfil</a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
