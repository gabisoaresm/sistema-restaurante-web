{% extends 'cardapio/base.html' %}

{% block titulo %}Senha Redefinida{% endblock %}

{% block conteudo %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-9 col-md-6 col-lg-4">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5 text-center">

                <i class="bi bi-check-circle fs-1 text-success"></i>
                <h4 class="mt-2 fw-semibold">Senha Redefinida</h4>
                <p class="text-muted small mt-3">
                    Sua senha foi redefinida com sucesso. Agora você pode entrar com a nova senha.
                </p>

                <div class="d-grid mt-4">
                    <a href="{% url 'login' %}" class="btn btn-success btn-lg">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Ir para o Login
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>
{% endblock %}
