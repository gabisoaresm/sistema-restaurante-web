{% extends 'cardapio/base.html' %}

{% block titulo %}Sair{% endblock %}

{% block conteudo %}
<div class="row justify-content-center mt-5">
    <div class="col-sm-9 col-md-6 col-lg-4">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5 text-center">

                <i class="bi bi-box-arrow-right fs-1 text-muted"></i>
                <h4 class="mt-3 fw-semibold">Encerrar sessão?</h4>
                <p class="text-muted small mt-2">
                    Olá, <strong>{% firstof user.first_name user.username "visitante" %}</strong>.
                    Tem certeza que deseja sair?
                </p>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-box-arrow-right me-1"></i>Confirmar Saída
                        </button>
                        <a href="{% url 'cardapio:home' %}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
