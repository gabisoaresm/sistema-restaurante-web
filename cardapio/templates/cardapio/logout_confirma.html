{% extends 'cardapio/base.html' %}

{% block titulo %}Sair{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body text-center">
                <h4 class="mb-3">Deseja sair?</h4>
                <p>Olá, <strong>{% firstof user.username "visitante" %}</strong>. Tem certeza que deseja encerrar a sessão?</p>

                <!-- Logout via POST (exigido pelo Django 5+) -->
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Confirmar Logout</button>
                    <a href="{% url 'cardapio:home' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
