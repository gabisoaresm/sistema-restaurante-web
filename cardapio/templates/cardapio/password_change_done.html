{% extends 'cardapio/base.html' %}

{% block titulo %}Senha Alterada{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5 text-center">

                <i class="bi bi-check-circle fs-1 text-success"></i>
                <h5 class="mt-3 fw-semibold">Senha alterada!</h5>
                <p class="text-muted small mb-4">Sua senha foi atualizada com sucesso.</p>

                <a href="{% url 'cardapio:perfil' %}" class="btn btn-success">
                    <i class="bi bi-person-circle me-1"></i>Voltar ao Perfil
                </a>

            </div>
        </div>

    </div>
</div>
{% endblock %}
