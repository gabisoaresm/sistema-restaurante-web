{% extends 'cardapio/base.html' %}

{% block titulo %}Registrar{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Criar Conta</h2>

        <form method="post">
            {% csrf_token %}
            <table class="formulario">
                {{ formulario.as_table }}
            </table>
            <div class="mt-3">
                <button type="submit" class="btn btn-success">Registrar</button>
            </div>
        </form>

        <hr>
        <p>Já tem conta? <a href="{% url 'login' %}">Faça login</a></p>
    </div>
</div>
{% endblock %}
