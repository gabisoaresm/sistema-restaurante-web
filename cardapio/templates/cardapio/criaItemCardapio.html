{% extends 'cardapio/base.html' %}

{% block titulo %}Novo Item do Cardápio{% endblock %}

{% block conteudo %}
<h2>Novo Item do Cardápio</h2>

<form method="post">
    {% csrf_token %}
    <table class="formulario">
        {{ formulario.as_table }}
    </table>
    <div class="mt-3">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{% url 'cardapio:lista-itens' %}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
